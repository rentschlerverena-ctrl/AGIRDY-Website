name: Astro zu IONOS Final Fix

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Code holen
        uses: actions/checkout@v4

      - name: ⚙️ Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗️ Astro Build
        run: |
          npm install
          npm run build

      - name: 🚀 Upload via SFTP (Einzeldatei-Modus)
        # Korrigierter Name der Action (npl statt n0pI)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: './dist/*'
          # Punkt steht für das Verzeichnis, das wir in FileZilla gesehen haben
          remote_path: './'
          sftp_only: true
