name: Astro zu IONOS (Pfad-Fix Final)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Code holen
        uses: actions/checkout@v4

      - name: ⚙️ Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗️ Astro Build
        run: |
          npm install
          npm run build

      - name: 🚀 Upload zwei Ebenen nach oben
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          # Wir nehmen den Inhalt von dist
          local_path: './dist/'
          # JETZT WICHTIG: ../../ klettert aus /wordpress/wp-content/ heraus
          # direkt in das Verzeichnis, das du in Bild 18 siehst.
          remote_path: '../../'
          sftp_only: true
