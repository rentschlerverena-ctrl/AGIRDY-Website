name: Astro zu IONOS (Finaler Versuch)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Code holen
        uses: actions/checkout@v4

      - name: ⚙️ Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗️ Astro Build
        run: |
          npm install
          npm run build

      - name: 🚀 Upload via SFTP (Port 22)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          # Wir nehmen alles aus dem dist-Ordner
          source: "dist/*"
          # Wir schieben es direkt ins Hauptverzeichnis
          target: "."
          # Das sorgt dafür, dass nicht der Ordner "dist" erstellt wird, sondern nur der Inhalt
          strip_components: 1
