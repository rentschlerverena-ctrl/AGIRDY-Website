name: Astro zu IONOS (Gebuendelt & Direkt)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Code holen
        uses: actions/checkout@v4

      - name: ⚙️ Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗️ Astro Build
        run: |
          npm install
          npm run build

      - name: 🚀 Sync Inhalt direkt nach Root
        # Wir nutzen diese Action, da sie in Bild 15 schon "grün" war
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          # Das './' am Ende von dist ist der entscheidende Trick: 
          # Es kopiert den INHALT von dist, nicht den Ordner selbst.
          local_path: './dist/'
          # Wir laden es direkt ins Root-Verzeichnis
          remote_path: '/'
          sftp_only: true
