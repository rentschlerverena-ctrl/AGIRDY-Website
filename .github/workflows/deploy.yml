name: Astro zu IONOS (Gebuendelt & Sauber)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Code holen
        uses: actions/checkout@v4

      - name: ⚙️ Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗️ Astro Build
        run: |
          npm install
          npm run build

      - name: 🚀 Gebuendelter Upload
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # WICHTIG: Er nimmt den GESAMTEN Inhalt von dist
          local-dir: ./dist/
          # Er laedt alles direkt ins Hauptverzeichnis
          server-dir: ./
          # Nutzt Port 22 (SFTP)
          protocol: sftp
          port: 22
