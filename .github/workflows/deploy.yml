name: Astro zu IONOS (SFTP Port 22 Fix)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Code holen
        uses: actions/checkout@v4

      - name: ⚙️ Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗️ Astro Build
        run: |
          npm install
          npm run build

      - name: 🚀 Upload via SFTP (Port 22)
        uses: n0pI/sftp-deploy-action@v1.0.1
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          localdir: ./dist
          remotedir: ./
          # Verhindert Berechtigungskonflikte bei IONOS
          ssh_shell: true
