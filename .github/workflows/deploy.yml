name: Astro zu IONOS (FTPS Version)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Code holen
        uses: actions/checkout@v4

      - name: ⚙️ Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗️ Astro Build
        run: |
          npm install
          npm run build

      - name: 🚀 Upload via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Astro Build-Ordner
          local-dir: ./dist/
          # Zielordner auf dem IONOS Server
          server-dir: ./
          # IONOS nutzt Port 21 für sicheres FTPS
          protocol: ftps
          port: 21
