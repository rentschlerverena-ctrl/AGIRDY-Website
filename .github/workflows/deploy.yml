name: Astro zu IONOS (Gebuendelt Fix)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Code holen
        uses: actions/checkout@v4

      - name: ⚙️ Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗️ Astro Build
        run: |
          npm install
          npm run build

      - name: 🚀 Sync Inhalt von dist nach Root
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          # Das ist der wichtigste Teil:
          # local_path mit '*' nimmt nur den INHALT, nicht den Ordner 'dist' selbst
          local_path: './dist/*'
          # remote_path '/' legt es direkt ins Hauptverzeichnis
          remote_path: '/'
          sftp_only: true
