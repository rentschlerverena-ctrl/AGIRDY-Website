name: Astro zu IONOS (Gebuendelt & Sicher)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Code holen
        uses: actions/checkout@v4

      - name: ⚙️ Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗️ Astro Build
        run: |
          npm install
          npm run build

      - name: 🚀 Gebuendelter Upload (Kein Loeschen)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          # WICHTIG: Er nimmt den Inhalt von dist
          local_path: './dist/'
          # Wir gehen zwei Ebenen hoch, um aus /wordpress/wp-content/ rauszukommen
          remote_path: '../../'
          sftp_only: true
          # Sicherstellen, dass nichts gelöscht wird
          delete_remote_files: false
