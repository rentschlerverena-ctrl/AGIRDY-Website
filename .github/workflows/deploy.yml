name: Astro zu IONOS (Schritt 1 - SFTP Fix)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Code holen
        uses: actions/checkout@v4

      - name: ⚙️ Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗️ Astro Build
        run: |
          npm install
          npm run build

      - name: 🚀 Upload via SFTP (Port 22)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          # Wir nehmen den Inhalt des Astro-Build-Ordners
          source: "dist/*"
          # Wir nutzen den relativen Pfad zum Home-Verzeichnis des Users
          target: "./"
          # Verhindert, dass ein Unterordner "dist" auf dem Server erstellt wird
          strip_components: 1
          # Erhöhtes Timeout, falls IONOS langsam antwortet
          timeout: 60s
