name: Astro zu IONOS (Clean & Sync)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Code holen
        uses: actions/checkout@v4

      - name: ⚙️ Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗️ Astro Build
        run: |
          npm install
          npm run build

      - name: 🚀 Gebündelter Upload & Cleanup
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # 1. Quelle: Alles aus dem fertigen Astro-Ordner
          local-dir: ./dist/
          # 2. Ziel: Direkt ins Hauptverzeichnis
          server-dir: ./
          protocol: sftp
          port: 22
          # 3. DER REINIGUNGS-BEFEHL:
          # Das löscht Dateien auf dem Server, die NICHT im Astro-Projekt sind.
          # VORSICHT: Er löscht auch alte WordPress-Dateien im Hauptordner!
          dry-run: false
          dangerous-clean-slate: false
          # Löscht nur Dateien, die im dist-Ordner nicht existieren:
          delete-destination-after: true
