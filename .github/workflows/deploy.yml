name: Astro zu IONOS (Versuch 2)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Code holen
        uses: actions/checkout@v4

      - name: ⚙️ Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗️ Website bauen
        run: |
          npm install
          npm run build

      - name: 🚀 Upload zu IONOS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # Falls deine Domain in einen Unterordner zeigt, trage ihn hier ein:
          server-dir: ./ 
          # Erzwinge FTP (manche Server mögen das lieber)
          protocol: ftps
          port: 22
