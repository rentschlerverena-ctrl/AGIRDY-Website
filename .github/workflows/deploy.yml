name: Astro zu IONOS (Pfad-Befreiung)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Code holen
        uses: actions/checkout@v4

      - name: ⚙️ Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗️ Astro Build
        run: |
          npm install
          npm run build

      - name: 🚀 Upload aus dem WP-Ordner heraus
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          # Wir nehmen ALLES aus dem dist-Ordner
          local_path: './dist/'
          # ../../ bedeutet: Geh aus /wp-content/ raus, geh aus /wordpress/ raus
          # Dann landest du im echten Hauptverzeichnis (Root)
          remote_path: '../../'
          sftp_only: true
