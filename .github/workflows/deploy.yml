name: Astro zu IONOS (SFTP Port 22)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Code holen
        uses: actions/checkout@v4

      - name: ⚙️ Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗️ Astro Build
        run: |
          npm install
          npm run build

      - name: 🚀 Upload via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # WICHTIG: Astro baut alles in den 'dist' Ordner
          local-dir: ./dist/
          # Hier ggf. den Pfad anpassen (meistens / oder /htdocs)
          server-dir: ./
          # Deine IONOS-Einstellungen:
          protocol: sftp
          port: 22
