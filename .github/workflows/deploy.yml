name: Astro zu IONOS Final

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Code holen
        uses: actions/checkout@v4

      - name: ⚙️ Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🏗️ Astro Build
        run: |
          npm install
          npm run build

      - name: 🚀 Upload via FTP (Stabil)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Astro baut in diesen Ordner
          local-dir: ./dist/
          # Dein Pfad aus dem FileZilla-Screenshot
          server-dir: ./
          # Wir nutzen Standard FTP, um den 'AUTH' Fehler zu vermeiden
          protocol: FTP 
          port: 22
