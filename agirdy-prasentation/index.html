<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>AGIRDY | Presentation</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.min.css">
    
    <style>
        /* --- HIER DEINE global.css STYLES --- */
        :root {
            --bg: #0a0f14;
            --text: #e6f1ff;
            --accent: #adff2f;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Lato', sans-serif; margin: 0; }
        
        /* Neural Network Canvas */
        #neural-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        /* Reveal Anpassungen */
        .reveal { background: transparent !important; }
        .reveal h1 { font-family: 'Archivo Black', sans-serif; color: var(--text); text-transform: uppercase; }
        .reveal h2 { font-family: 'Bebas Neue', sans-serif; color: var(--accent); }
        .reveal .slides section { text-align: left; }
    </style>
</head>
<body>

    <canvas id="neural-canvas"></canvas>

    <div class="reveal">
        <div class="slides">
            <section>
                <h1>Artificial General Intelligence</h1>
                <h2 class="accent">Ready</h2>
                <p>Philipp Feindert & Jan Junge</p>
            </section>

            <section>
                <h2>The Vision</h2>
                <p>Implementierung von Neural Architectures für Business.</p>
            </section>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.min.js"></script>
    <script>
        Reveal.initialize({ hash: true });

        // DEIN NEURAL NETWORK SCRIPT (aus Hero.astro)
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Dot {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#adff2f';
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 60; i++) dots.push(new Dot());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dots.forEach(d => { d.update(); d.draw(); });
            requestAnimationFrame(animate);
        }
        init();
        animate();
    </script>
</body>
</html>
